name: Build container image

on:
  pull_request:
    branches:
      - master
  schedule:
    - cron: "0 5,11,17,23 * * *" # Every 6 hours starting at 05:00 UTC
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=${repo}" >> "$GITHUB_OUTPUT"

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        env:
          ASTRALFORGE_IMAGE: ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          ASTRALFORGE_GIT_SHA: ${{ github.sha }}
          ASTRALFORGE_SOURCE: https://github.com/${{ github.repository }}
        run: |
          ./astralforge build
          primary="${ASTRALFORGE_IMAGE}"
          while IFS= read -r tag; do
            if [[ -n "$tag" && "$tag" != "$primary" ]]; then
              podman tag "$primary" "$tag"
            fi
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && podman push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Keep latest 5 GHCR versions
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const packageName = context.repo.repo.toLowerCase();
            const packageType = "container";
            const ownerType = context.payload.repository.owner.type;
            const keep = 5;

            const listVersions = async () => {
              if (ownerType === "Organization") {
                return github.paginate(
                  "GET /orgs/{org}/packages/{package_type}/{package_name}/versions",
                  {
                    org: owner,
                    package_type: packageType,
                    package_name: packageName,
                    per_page: 100,
                  }
                );
              }

              return github.paginate(
                "GET /users/{username}/packages/{package_type}/{package_name}/versions",
                {
                  username: owner,
                  package_type: packageType,
                  package_name: packageName,
                  per_page: 100,
                }
              );
            };

            const deleteVersion = async (versionId) => {
              if (ownerType === "Organization") {
                return github.request(
                  "DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}",
                  {
                    org: owner,
                    package_type: packageType,
                    package_name: packageName,
                    package_version_id: versionId,
                  }
                );
              }

              return github.request(
                "DELETE /users/{username}/packages/{package_type}/{package_name}/versions/{package_version_id}",
                {
                  username: owner,
                  package_type: packageType,
                  package_name: packageName,
                  package_version_id: versionId,
                }
              );
            };

            const versions = await listVersions();
            versions.sort(
              (a, b) => new Date(b.created_at).getTime() - new Date(a.created_at).getTime()
            );

            const staleVersions = versions.slice(keep);
            core.info(
              `Found ${versions.length} versions for ${owner}/${packageName}; keeping ${Math.min(versions.length, keep)} and deleting ${staleVersions.length}.`
            );

            for (const version of staleVersions) {
              await deleteVersion(version.id);
              core.info(`Deleted package version ${version.id} (${version.name}).`);
            }

      - name: Summary
        run: |
          {
            echo '## Container image'
            echo
            echo 'Image repository: `${{ steps.image.outputs.name }}`'
            echo
            echo '| Tag |'
            echo '|-----|'
          } >> "$GITHUB_STEP_SUMMARY"
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && echo "| \`${tag}\` |" >> "$GITHUB_STEP_SUMMARY"
          done <<< "${{ steps.meta.outputs.tags }}"
          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            echo >> "$GITHUB_STEP_SUMMARY"
            echo '*Pull request build: not pushed.*' >> "$GITHUB_STEP_SUMMARY"
          fi
